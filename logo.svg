<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="rimGrad" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="45%" stop-color="#CCCCCC"/>
      <stop offset="75%" stop-color="#B5B5B5"/>
      <stop offset="100%" stop-color="#969696"/>
    </radialGradient>

    <linearGradient id="follGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8A8A8A"/>
      <stop offset="18%" stop-color="#AAAAAA"/>
      <stop offset="38%" stop-color="#CACACA"/>
      <stop offset="50%" stop-color="#D8D8D8"/>
      <stop offset="62%" stop-color="#C5C5C5"/>
      <stop offset="82%" stop-color="#A5A5A5"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>

    <linearGradient id="shaftGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8A8A8"/>
      <stop offset="35%" stop-color="#CCCCCC"/>
      <stop offset="50%" stop-color="#E0E0E0"/>
      <stop offset="65%" stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
